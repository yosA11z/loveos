<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Acceso | LoveOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Tiempos+Headline:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/src/styles/reset-password.css">
</head>

<body class="min-h-screen flex items-center">
    <div class="mesh-bg"></div>

    <div class="container mx-auto px-6 md:px-12 py-12">
        <div class="flex flex-col lg:flex-row items-center justify-between gap-16">

            <!-- Bloque Izquierdo: Mensaje Editorial / Soporte AI -->
            <div class="w-full lg:w-1/2 space-y-8">
                <div class="inline-flex items-center gap-3 bg-white/5 px-4 py-2 rounded-full border border-white/10">
                    <span class="w-2 h-2 rounded-full bg-primary pulse"></span>
                    <span class="text-[10px] font-bold uppercase tracking-widest text-stone-400">Asistente de
                        Acceso</span>
                </div>

                <h1 class="text-5xl md:text-7xl font-headline font-bold text-white leading-tight">
                    A veces las llaves <br> se <span class="italic text-primary">pierden.</span>
                </h1>

                <div class="chat-bubble p-6 max-w-md">
                    <p class="text-stone-400 leading-relaxed font-light">
                        "No te preocupes. Estoy aquí para ayudarte a volver a entrar. Solo necesito confirmar que eres
                        tú para enviarte un enlace de seguridad."
                    </p>
                    <div class="mt-4 flex items-center gap-3">
                        <div
                            class="w-8 h-8 rounded-full bg-gradient-to-tr from-primary to-secondary flex items-center justify-center text-[10px] font-bold">
                            AI</div>
                        <span class="text-[10px] uppercase tracking-widest font-bold text-stone-500">LoveOS
                            Intelligence</span>
                    </div>
                </div>
            </div>

            <!-- Bloque Derecho: Formulario Minimalista -->
            <div class="w-full lg:w-1/3">
                <form action="#" class="space-y-12">
                    <div class="space-y-4">
                        <label class="block text-[10px] font-black uppercase tracking-[0.3em] text-stone-600 ml-1">
                            Tu dirección de correo
                        </label>
                        <input type="email" placeholder="nombre@email.com"
                            class="input-transparent w-full py-4 text-2xl md:text-3xl text-white font-light placeholder-stone-800"
                            required>
                    </div>

                    <div class="space-y-6">
                        <button type="submit"
                            class="btn-glow w-full bg-white text-black py-6 rounded-full font-bold uppercase tracking-widest text-xs">
                            Recuperar mi espacio
                        </button>

                        <div class="flex items-center justify-between px-2">
                            <a href="/src/pages/login.html"
                                class="text-[10px] font-bold uppercase tracking-widest text-stone-500 hover:text-primary transition-colors">
                                Volver al login
                            </a>
                        </div>
                    </div>
                </form>
            </div>

        </div>
    </div>

    <!-- Footer decorativo -->
    <div class="fixed bottom-8 left-8 hidden lg:block">
        <p
            class="text-[10px] text-stone-800 font-black uppercase tracking-[0.5em] rotate-180 [writing-mode:vertical-lr]">
            Security Layer 2.0 // LoveOS
        </p>
    </div>

</body>

</html>
