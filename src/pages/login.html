<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoveOS - Iniciar Sesión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Tiempos+Headline:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/src/styles/login.css">
</head>

<body>

    <div class="hero-glow"></div>

    <div class="w-full max-w-md px-6 relative">
        <!-- Logo Volver -->
        <a href="/index.html"
            class="absolute -top-16 left-6 flex items-center gap-2 text-stone-500 hover:text-white transition-colors text-xs font-bold uppercase tracking-widest">
            <i class="fa-solid fa-arrow-left"></i> Volver al inicio
        </a>

        <div class="glass-card rounded-[2.5rem] p-10 shadow-2xl">
            <!-- Avatar de Sofía -->
            <div class="flex flex-col items-center mb-10">
                <div
                    class="avatar-container w-24 h-24 rounded-full border-2 border-white/20 overflow-hidden mb-6 bg-stone-800">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Sofia" alt="Sofia Avatar"
                        class="w-full h-full object-cover">
                </div>
                <h1 class="text-3xl font-headline font-bold text-center">¡Hola de nuevo!</h1>
                <p class="text-stone-500 text-sm mt-2 text-center">Inicia sesión para continuar</p>
            </div>

            <!-- Formulario -->
            <form class="space-y-6">
                <div class="input-group">
                    <label
                        class="block text-[10px] font-black uppercase tracking-widest text-stone-500 mb-2 ml-1">Correo
                        electrónico</label>
                    <input type="email" placeholder="tu@email.com"
                        class="w-full px-5 py-4 rounded-2xl text-white text-sm" required>
                </div>

                <div class="input-group">
                    <div class="flex justify-between items-center mb-2 ml-1">
                        <label
                            class="block text-[10px] font-black uppercase tracking-widest text-stone-500">Contraseña</label>
                        <a href="/src/pages/reset-password.html"
                            class="text-[10px] font-bold text-[#ff4d6d] hover:underline uppercase tracking-widest">¿Olvidaste
                            tu contraseña?</a>
                    </div>
                    <input type="password" placeholder="••••••••"
                        class="w-full px-5 py-4 rounded-2xl text-white text-sm" required>
                </div>

                <button type="submit" class="cta-button w-full py-5 rounded-2xl text-white font-bold text-lg mt-4">
                    Iniciar sesión
                </button>
            </form>
        </div>
    </div>
    <script type="module" src="/src/js/login.js"></script>
</body>

</html>
